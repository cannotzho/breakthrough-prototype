name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stage deployment
        run: |
          mkdir -p deploy/dev
          cp -r dist/* deploy/dev/
          cat > deploy/index.html << 'WIP'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Breakthrough — Work in Progress</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                min-height: 100vh;
                background: #09090b;
                color: #a1a1aa;
                font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 2rem;
              }
              h1 {
                color: #fff;
                font-size: 2.5rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                margin-bottom: 0.5rem;
              }
              .subtitle { font-size: 1.1rem; margin-bottom: 2rem; }
              .wip {
                display: inline-block;
                border: 1px solid #3f3f46;
                padding: 0.5rem 1.5rem;
                font-size: 0.85rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: #71717a;
                margin-bottom: 2.5rem;
              }
              .link {
                color: #52525b;
                font-size: 0.75rem;
                text-decoration: none;
                border-bottom: 1px solid #3f3f46;
                padding-bottom: 1px;
                transition: color 0.2s;
              }
              .link:hover { color: #a1a1aa; }
            </style>
          </head>
          <body>
            <h1>Breakthrough</h1>
            <p class="subtitle">A detective card game</p>
            <div class="wip">Work in Progress</div>
            <p><a class="link" href="dev/">Tester access</a></p>
          </body>
          </html>
          WIP

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
